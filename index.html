


<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sim ou Não?</title>

    <style>

        body {

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            margin: 0;

            background-color: #f0f0f0;

            font-family: Arial, sans-serif;

        }

        .container {

            text-align: center;

        }

        h1 {

            font-size: 2em;

            margin-bottom: 20px;

        }

        .button {

            padding: 15px 30px;

            font-size: 1.2em;

            margin: 10px;

            cursor: pointer;

            border: none;

            border-radius: 5px;

            transition: transform 0.2s;

        }

        #sim {

            background-color: #4CAF50;

            color: white;

        }

        #nao {

            background-color: #f44336;

            color: white;

            position: absolute;

        }

        .button:hover {

            transform: scale(1.1);

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Hoje tem lovezinho com a morena? 
  </h1>

        <button class="button" id="sim" onclick="irParaVideo()">Sim</button>

        <button class="button" id="nao" onmouseover="moverNao()">Não</button>

    </div>

    <script>

        function moverNao() {

            const nao = document.getElementById('nao');

            const maxX = window.innerWidth - nao.offsetWidth;

            const maxY = window.innerHeight - nao.offsetHeight;

            const novoX = Math.random() * maxX;

            const novoY = Math.random() * maxY;

            nao.style.left = novoX + 'px';

            nao.style.top = novoY + 'px';

        }

        function irParaVideo() {

            window.open('https://youtu.be/ElN_4vUvTPs?si=HY6Gw5b9wK1P2EhG', '_blank');

        }

    </script>

</body>

</html>
